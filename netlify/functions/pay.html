<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>默默占星骰子 · 訂閱方案</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Noto+Serif+TC:wght@400;600;700&display=swap');

  :root{
    --ink:#0B1026;
    --ink-deep:#070A1A;
    --gold:#D4AF7A;
    --gold-soft:#E9D2A8;
    --plum:#4A3B6B;
    --cream:#F2ECE1;
    --silver:#8C92AC;
    --line: rgba(212,175,122,0.25);
  }

  *{box-sizing:border-box;}
  body{
    background: radial-gradient(ellipse at 20% -10%, rgba(74,59,107,0.55), transparent 60%),
                radial-gradient(ellipse at 85% 110%, rgba(212,175,122,0.10), transparent 55%),
                var(--ink-deep);
    color:var(--cream);
    font-family:'Noto Serif TC', serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
  }

  .eyebrow{
    font-family:'Cormorant Garamond', serif;
    letter-spacing:0.25em;
    font-size:18px;
    color:var(--gold);
    text-align:center;
    margin-bottom:8px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(22px,4vw,32px);
    font-weight:600;
    text-align:center;
    margin:0 0 8px;
  }
  h1 em{ font-style:italic; color:var(--gold-soft); }
  .sub{
    color:var(--silver);
    font-size:14px;
    text-align:center;
    margin:0 0 40px;
    line-height:1.8;
  }

  .plans{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
    max-width:560px;
    margin-bottom:32px;
  }

  .plan{
    flex:1;
    min-width:220px;
    background:linear-gradient(160deg, rgba(74,59,107,0.35), rgba(11,16,38,0.6));
    border:1px solid var(--line);
    border-radius:12px;
    padding:28px 22px;
    text-align:center;
    cursor:pointer;
    transition:border-color 0.2s, transform 0.15s;
    position:relative;
  }
  .plan:hover{ transform:translateY(-2px); border-color:var(--gold); }
  .plan.selected{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold); }
  .plan-badge{
    position:absolute;
    top:-12px; left:50%; transform:translateX(-50%);
    background:var(--gold);
    color:var(--ink-deep);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.1em;
    padding:3px 12px;
    border-radius:999px;
    white-space:nowrap;
  }
  .plan-name{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    color:var(--gold-soft);
    margin-bottom:8px;
  }
  .plan-price{
    font-size:32px;
    font-weight:700;
    color:var(--cream);
    margin-bottom:4px;
  }
  .plan-price span{ font-size:14px; font-weight:400; color:var(--silver); }
  .plan-desc{
    font-size:13px;
    color:var(--silver);
    line-height:1.7;
    margin-top:10px;
  }

  .email-row{
    width:100%;
    max-width:380px;
    margin-bottom:20px;
  }
  .email-row input{
    width:100%;
    font-family:'Noto Serif TC', serif;
    font-size:14px;
    color:var(--cream);
    background:rgba(7,10,26,0.5);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 16px;
  }
  .email-row input::placeholder{ color:var(--silver); }

  #pay-btn{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    letter-spacing:0.15em;
    color:var(--ink-deep);
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    border:none;
    padding:14px 48px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 30px -10px rgba(212,175,122,0.5);
    transition:transform 0.15s, box-shadow 0.15s;
    margin-bottom:16px;
  }
  #pay-btn:hover{ transform:translateY(-2px); box-shadow:0 14px 34px -10px rgba(212,175,122,0.65); }
  #pay-btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .hint{
    font-size:12px;
    color:var(--silver);
    text-align:center;
    line-height:1.8;
  }
  .hint a{ color:var(--gold); text-decoration:none; }

  .back{
    margin-top:24px;
    font-size:13px;
    color:var(--silver);
    text-decoration:none;
  }
  .back:hover{ color:var(--gold-soft); }
</style>
</head>
<body>

<div class="eyebrow">默默 占星骰子</div>
<h1>選擇你的<em>方案</em></h1>
<p class="sub">付款成功後，解鎖連結將自動寄到你的Email<br>讓占星陪伴你每一天的探索</p>

<div class="plans">
  <div class="plan" id="plan-monthly" onclick="selectPlan('monthly')">
    <div class="plan-name">月繳方案</div>
    <div class="plan-price">NT$99 <span>/月</span></div>
    <div class="plan-desc">30天無限次使用<br>隨時可以停止</div>
  </div>
  <div class="plan selected" id="plan-yearly" onclick="selectPlan('yearly')">
    <div class="plan-badge">最划算</div>
    <div class="plan-name">年繳方案</div>
    <div class="plan-price">NT$999 <span>/年</span></div>
    <div class="plan-desc">365天無限次使用<br>相當於每月 NT$83</div>
  </div>
</div>

<div class="email-row">
  <input type="email" id="email" placeholder="輸入你的Email（付款成功後寄送連結）" required>
</div>

<button id="pay-btn" onclick="startPayment()">前往付款</button>

<p class="hint">
  付款由藍新金流處理，安全加密<br>
  如有問題請私訊 <a href="https://instagram.com/slience_tarot" target="_blank">@slience_tarot</a>
</p>

<a href="/" class="back">← 返回占星骰子</a>

<!-- 隱藏表單，送出到藍新 -->
<form id="newebpay-form" method="POST" action="https://core.newebpay.com/MPG/mpg_gateway" style="display:none">
  <input type="hidden" name="MerchantID" id="f-merchant">
  <input type="hidden" name="TradeInfo" id="f-tradeinfo">
  <input type="hidden" name="TradeSha" id="f-tradesha">
  <input type="hidden" name="Version" value="2.0">
</form>

<script>
  let selectedPlan = 'yearly';

  function selectPlan(plan){
    selectedPlan = plan;
    document.getElementById('plan-monthly').classList.toggle('selected', plan === 'monthly');
    document.getElementById('plan-yearly').classList.toggle('selected', plan === 'yearly');
  }

  async function startPayment(){
    const email = document.getElementById('email').value.trim();
    if(!email || !email.includes('@')){
      alert('請先填寫有效的Email地址');
      return;
    }

    const btn = document.getElementById('pay-btn');
    btn.disabled = true;
    btn.textContent = '處理中…';

    try{
      const res = await fetch('/.netlify/functions/create-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan: selectedPlan, email })
      });
      const data = await res.json();

      if(data.error){ throw new Error(data.error); }

      document.getElementById('f-merchant').value = data.MerchantID;
      document.getElementById('f-tradeinfo').value = data.TradeInfo;
      document.getElementById('f-tradesha').value = data.TradeSha;
      document.getElementById('newebpay-form').action = data.PayGateWay;
      document.getElementById('newebpay-form').submit();

    }catch(err){
      alert('建立付款失敗：' + err.message);
      btn.disabled = false;
      btn.textContent = '前往付款';
    }
  }
</script>
</body>
</html>
